<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Is Set 5 Out Yet? | PvZH Vault</title>
  <meta name="description" content="Is Set 5 out yet for Plants vs. Zombies Heroes? No." />
  <meta name="theme-color" content="#12181b" />
  <link rel="icon" type="image/png" href="/pvzhvault_favicon.png">

  <style>
    :root {
      --bg-color: #12181b;
      --card-bg: #2a2e33;
      --card-bg-2: #20252a;
      --text-primary: #ffffff;
      --text-secondary: #a0aab2;
      --accent: #00b4d8;
      --accent-soft: rgba(0, 180, 216, 0.16);
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 20%, rgba(0, 180, 216, 0.11), transparent 34rem),
        var(--bg-color);
      color: var(--text-primary);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    .updated {
  margin-top: 8px;
  color: var(--text-secondary);
  font-size: 0.9rem;
  font-weight: 650;
  opacity: 0.85;
}
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      text-align: center;
    }
    .page-title {
  margin: 0 0 clamp(24px, 5vw, 46px);
  color: var(--text-primary);
  font-size: clamp(2rem, 7vw, 4.8rem);
  line-height: 1;
  font-weight: 1000;
  letter-spacing: -0.04em;
  text-shadow:
    0 0 24px rgba(0, 180, 216, 0.18),
    0 14px 42px rgba(0, 0, 0, 0.32);
}

.no {
  margin: 0;
  font-size: clamp(8rem, 28vw, 24rem);
  line-height: 0.78;
  font-weight: 1000;
  text-shadow:
    0 0 32px rgba(0, 180, 216, 0.22),
    0 24px 70px rgba(0, 0, 0, 0.42);
}
   

    .under {
      margin-top: clamp(28px, 5vw, 48px);
      color: var(--text-secondary);
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      font-weight: 700;
    }

    .arrow {
      display: block;
      margin: 14px auto 16px;
      color: var(--accent);
      font-size: 2rem;
      animation: bounce 1.15s ease-in-out infinite;
      text-shadow: 0 0 18px rgba(0, 180, 216, 0.45);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 999px;
      border: 1px solid rgba(0, 180, 216, 0.38);
      background: var(--accent-soft);
      color: var(--text-primary);
      font-weight: 900;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: rgba(0, 180, 216, 0.24);
      border-color: rgba(0, 180, 216, 0.62);
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(8px);
      }
    }
  </style>
</head>

<body>
  <main>
  <h1 class="page-title">Is Set 5 Out Yet?</h1>

  <div class="no" aria-label="No">NO</div>

  <div class="under">
    search decks instead
    <span class="arrow" aria-hidden="true">↓</span>
    <a class="btn" href="/">Search Decks</a>
    <div class="updated">Last Checked: <span id="today-date"></span></div>
  </div>
</main>
  <script>
  document.getElementById("today-date").textContent =
    new Intl.DateTimeFormat("en-US", {
      month: "long",
      day: "numeric",
      year: "numeric"
    }).format(new Date());
</script>
</body>
</html>
